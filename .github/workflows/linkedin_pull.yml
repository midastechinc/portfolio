name: LinkedIn Pull

on:
  workflow_dispatch:
  schedule:
    - cron: "15 13 * * *"

jobs:
  linkedin-pull:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore cached LinkedIn session
        uses: actions/cache@v4
        with:
          path: .cache/linkedin_session.json
          key: linkedin-session-${{ github.repository }}

      - name: Seed LinkedIn session from secret
        env:
          LINKEDIN_SESSION_JSON: ${{ secrets.LINKEDIN_SESSION_JSON }}
        run: |
          if [ -n "$LINKEDIN_SESSION_JSON" ] && [ ! -f .cache/linkedin_session.json ]; then
            mkdir -p .cache
            printf "%s" "$LINKEDIN_SESSION_JSON" > .cache/linkedin_session.json
            echo "Seeded LinkedIn session from repository secret." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install Python dependencies
        run: pip install -r requirements-linkedin.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Validate required secrets
        env:
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          LINKEDIN_SESSION_JSON: ${{ secrets.LINKEDIN_SESSION_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=0
          for key in LINKEDIN_EMAIL LINKEDIN_PASSWORD SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add the missing secrets in GitHub -> Settings -> Secrets and variables -> Actions." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          if [ -z "$LINKEDIN_SESSION_JSON" ]; then
            echo "LINKEDIN_SESSION_JSON is not set. The workflow will try a fresh login, which may trigger a LinkedIn security challenge." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run LinkedIn scraper
        env:
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LINKEDIN_COOKIE_FILE: .cache/linkedin_session.json
          LINKEDIN_HEADLESS: "true"
        run: python scripts/linkedin_scraper.py

      - name: Workflow summary
        run: |
          echo "LinkedIn scraper completed." >> "$GITHUB_STEP_SUMMARY"
          echo "Dashboard data should reflect the latest Supabase rows after the next refresh." >> "$GITHUB_STEP_SUMMARY"
