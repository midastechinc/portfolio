name: LinkedIn Pull

on:
  workflow_dispatch:

jobs:
  linkedin-pull:
    runs-on: ubuntu-latest
    steps:
      - name: Start run
        run: |
          echo "LinkedIn pull workflow started."
          echo "Triggered ref: ${{ github.ref }}"
      - name: Optional external pull webhook
        env:
          LINKEDIN_PULL_WEBHOOK_URL: ${{ secrets.LINKEDIN_PULL_WEBHOOK_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "$LINKEDIN_PULL_WEBHOOK_URL" ]; then
            echo "No LINKEDIN_PULL_WEBHOOK_URL secret is configured." >> "$GITHUB_STEP_SUMMARY"
            echo "The workflow file now exists, so dispatch works, but no LinkedIn scraper endpoint has been connected yet." >> "$GITHUB_STEP_SUMMARY"
            echo "Configure a repository secret named LINKEDIN_PULL_WEBHOOK_URL to connect your actual LinkedIn pull service." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          payload=$(printf '{"repository":"%s","ref":"%s","run_id":"%s"}' "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME" "$GITHUB_RUN_ID")
          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$LINKEDIN_PULL_WEBHOOK_URL"

          echo "LinkedIn pull webhook dispatched successfully." >> "$GITHUB_STEP_SUMMARY"
